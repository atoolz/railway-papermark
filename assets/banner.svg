<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" fill="#0A0118"/>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <ellipse cx="600" cy="200" rx="500" ry="250" fill="url(#glow)"/>
  <!-- Document icon -->
  <g transform="translate(460, 80)">
    <rect x="0" y="0" width="80" height="108" rx="6" fill="#7C3AED" opacity="0.12" stroke="#7C3AED" stroke-width="2.5"/>
    <line x1="16" y1="26" x2="64" y2="26" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="42" x2="56" y2="42" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="16" y1="58" x2="60" y2="58" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <g transform="translate(40, 82)">
      <ellipse cx="0" cy="0" rx="16" ry="10" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="5" fill="#7C3AED"/>
    </g>
  </g>
  <!-- Plus sign -->
  <g transform="translate(570, 126)">
    <line x1="0" y1="8" x2="16" y2="8" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="0" x2="8" y2="16" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Railway logo area -->
  <g transform="translate(610, 100)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#7C3AED" opacity="0.12" stroke="#7C3AED" stroke-width="2.5"/>
    <g transform="translate(40, 40)">
      <rect x="-20" y="-6" width="40" height="4" rx="2" fill="#7C3AED"/>
      <rect x="-20" y="2" width="40" height="4" rx="2" fill="#7C3AED" opacity="0.6"/>
      <rect x="-16" y="-16" width="4" height="32" rx="2" fill="#7C3AED" opacity="0.4"/>
      <rect x="12" y="-16" width="4" height="32" rx="2" fill="#7C3AED" opacity="0.4"/>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1">Papermark</text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#A78BFA" opacity="0.9">Open-source DocSend alternative on Railway</text>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#7C3AED" opacity="0.6">Share documents with analytics, custom domains, and data rooms</text>
</svg>
